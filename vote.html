<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting – UKK Kuliner</title>
  <meta name="description" content="Halaman konfirmasi voting UKK Kuliner." />
  <meta http-equiv="Cache-Control" content="no-store" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Icon wrapper ── */
    function Icon({ name, size = 24, style = {}, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !window.lucide?.[name]) return;
        ref.current.innerHTML = '';
        const svg = window.lucide.createElement(window.lucide[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        if (className) svg.setAttribute('class', className);
        Object.assign(svg.style, style);
        ref.current.appendChild(svg);
      }, [name, size, className]);
      return <span ref={ref} className="icon" />;
    }

    /* ════════════════════════════════════════════
       VoteApp
    ════════════════════════════════════════════ */
    function VoteApp() {
      // null = loading, object = hasil vote
      const [result,    setResult]    = useState(null);
      const [countdown, setCountdown] = useState(3); // detik sebelum redirect

      // useRef guard: pastikan processVote hanya dipanggil SEKALI
      const started = useRef(false);

      useEffect(() => {
        if (started.current) return;
        started.current = true;

        const params = new URLSearchParams(window.location.search);
        const token  = params.get('vote');

        if (!token) {
          setResult({
            ok:       false,
            state:    'notoken',
            foodName: '',
            message:  'Tidak ada token voting di URL ini. Silakan scan QR code yang benar.',
          });
          return;
        }

        // Proses vote secara async ke Firebase
        processVote(token).then((r) => {
          setResult({
            ok:       r.ok,
            state:    r.ok ? 'success' : 'error',
            foodName: r.food ? r.food.name : '',
            message:  r.ok ? 'Vote berhasil ditambahkan untuk' : r.error,
          });
        }).catch(() => {
          setResult({
            ok:       false,
            state:    'error',
            foodName: '',
            message:  'Terjadi kesalahan tak terduga. Silakan coba lagi.',
          });
        });
      }, []);

      // ── Auto-redirect ke leaderboard setelah hasil tampil ──
      useEffect(() => {
        if (!result) return; // tunggu sampai ada hasil
        if (result.state === 'notoken') return; // jangan redirect kalau token tidak ada

        // Hitung mundur
        const ticker = setInterval(() => {
          setCountdown(c => {
            if (c <= 1) {
              clearInterval(ticker);
              window.location.href = 'leaderboard.html';
              return 0;
            }
            return c - 1;
          });
        }, 1000);

        return () => clearInterval(ticker);
      }, [result]);

      // ── Loading state ──
      if (!result) {
        return (
          <div className="page-wrapper">
            <nav className="navbar glass-panel">
              <div className="navbar-brand">
                <div className="navbar-logo"><Icon name="ChefHat" size={22} style={{ color:'#34d399' }}/></div>
                <div>
                  <div className="navbar-title">UKK KULINER</div>
                  <div className="navbar-subtitle">Sistem Voting</div>
                </div>
              </div>
            </nav>
            <div className="vote-bg" style={{ flexDirection:'column', gap:'1rem' }}>
              <div style={{ width:'3.5rem',height:'3.5rem',border:'3px solid rgba(255,255,255,.1)',borderTopColor:'#34d399',borderRadius:'50%',animation:'spin .8s linear infinite' }}/>
              <p style={{ color:'#94a3b8', fontSize:'1rem' }}>Memproses vote ke Firebase…</p>
              <p style={{ color:'#475569', fontSize:'.8rem' }}>Mohon tunggu sebentar</p>
            </div>
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        );
      }

      const { ok, state, foodName, message } = result;
      const isSuccess  = ok;
      const accent      = isSuccess ? '#10b981' : '#ef4444';
      const accentLight = isSuccess ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)';
      const glowBg      = isSuccess
        ? 'radial-gradient(circle at center, #059669 0%, #020617 70%)'
        : 'radial-gradient(circle at center, #dc2626 0%, #020617 70%)';

      return (
        <div className="page-wrapper">
          <nav className="navbar glass-panel">
            <div className="navbar-brand">
              <div className="navbar-logo"><Icon name="ChefHat" size={22} style={{ color:'#34d399' }}/></div>
              <div>
                <div className="navbar-title">UKK KULINER</div>
                <div className="navbar-subtitle">Sistem Voting</div>
              </div>
            </div>
            <div className="navbar-actions">
              <a href="leaderboard.html" className="btn btn-ghost" style={{ textDecoration:'none', fontSize:'.8rem' }}>
                <Icon name="BarChart2" size={14}/> Ranking
              </a>
            </div>
          </nav>

          <main className="vote-bg">
            <div className="vote-glow" style={{ background: glowBg }}/>

            <div className="glass-panel vote-card animate-slide-up" style={{
              borderColor: isSuccess ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)',
              boxShadow:   isSuccess ? '0 20px 50px rgba(16,185,129,0.15)' : '0 20px 50px rgba(239,68,68,0.15)',
            }}>
              {/* Icon */}
              <div className="vote-icon-wrapper">
                <div className="vote-icon-circle" style={{ background:accentLight, color:accent }}>
                  <div className="vote-ping animate-ping" style={{ background:accent }}/>
                  <Icon
                    name={isSuccess ? 'CheckCircle2' : state === 'notoken' ? 'AlertCircle' : 'XCircle'}
                    size={54} style={{ position:'relative', zIndex:10, color:accent }}
                  />
                </div>
              </div>

              {/* Title */}
              <h1 className="vote-title">
                {isSuccess ? 'Vote Diterima! 🎉'
                  : state === 'notoken' ? 'Halaman Tidak Valid'
                  : 'Gagal Menyimpan'}
              </h1>

              {/* Message */}
              <div style={{ marginBottom:'.5rem' }}>
                <p className="vote-message">{message}</p>
                {foodName && (
                  <p className="vote-food-name" style={{ color:accent }}>"{foodName}"</p>
                )}
              </div>

              {/* Info Box */}
              <div className="vote-info-box">
                <p className="vote-info-text">
                  {isSuccess
                    ? '✅ Terima kasih atas partisipasi Anda! Poin telah ditambahkan secara real-time ke layar proyektor.'
                    : state === 'notoken'
                      ? '🔗 Halaman ini hanya dapat diakses melalui QR code yang tersedia di area acara.'
                      : '⚠️ Setiap perangkat hanya diizinkan memberikan satu vote untuk seluruh kompetisi.'}
                </p>
              </div>

              {/* Success detail */}
              {isSuccess && foodName && (
                <div style={{ background:'rgba(16,185,129,0.08)', border:'1px solid rgba(16,185,129,0.2)', borderRadius:'.875rem', padding:'.875rem 1rem', marginBottom:'1.25rem' }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'.5rem', color:'#34d399', fontWeight:600 }}>
                    <Icon name="Trophy" size={18} style={{ color:'#34d399' }}/> {foodName}
                  </div>
                </div>
              )}

              {/* Auto-redirect countdown */}
              {result.state !== 'notoken' && (
                <div style={{ textAlign:'center' }}>
                  {/* Progress bar */}
                  <div style={{ height:'3px', background:'rgba(255,255,255,0.08)', borderRadius:'99px', overflow:'hidden', marginBottom:'1rem' }}>
                    <div style={{
                      height:'100%',
                      background: isSuccess ? 'linear-gradient(90deg,#34d399,#10b981)' : 'linear-gradient(90deg,#f87171,#ef4444)',
                      borderRadius:'99px',
                      width:`${(countdown/3)*100}%`,
                      transition:'width 1s linear',
                    }}/>
                  </div>

                  {/* Countdown text */}
                  <p style={{ color:'#64748b', fontSize:'.8rem', marginBottom:'.75rem' }}>
                    Menuju leaderboard dalam <strong style={{ color: isSuccess?'#34d399':'#f87171' }}>{countdown}</strong> detik…
                  </p>

                  {/* Manual button */}
                  <a href="leaderboard.html" className="btn btn-dark"
                    style={{ width:'100%', justifyContent:'center', padding:'.875rem', fontSize:'.95rem', textDecoration:'none' }}>
                    <Icon name="BarChart2" size={16}/> Lihat Ranking Sekarang
                  </a>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<VoteApp/>);
  </script>
</body>
</html>
