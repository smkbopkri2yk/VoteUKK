<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UKK Kuliner 2024 – Live Voting System</title>
  <meta name="description" content="Sistem voting live real-time untuk kompetisi kuliner UKK. Lihat ranking langsung di layar proyektor." />

  <!-- React & Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #020617; color: #fff; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* Keyframe Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes flashEffect {
      0%   { filter: brightness(1); transform: scale(1); }
      50%  { filter: brightness(1.5) drop-shadow(0 0 20px rgba(255,190,11,0.8)); transform: scale(1.02); }
      100% { filter: brightness(1); transform: scale(1); }
    }
    @keyframes floatCrown {
      0%   { transform: translateY(0px) rotate(0deg); }
      50%  { transform: translateY(-4px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .animate-flash  { animation: flashEffect 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .animate-crown  { animation: floatCrown  3s ease-in-out infinite; }
    .animate-ping   { animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }
    .animate-pulse  { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-slideUp { animation: slideUp 0.8s ease-out; }
    .animate-slideUp-fast { animation: slideUp 0.3s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }

    /* Utility classes (subset of Tailwind) */
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .modal-overlay {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      animation: fadeIn 0.3s ease-out;
    }

    /* ─── Layout Helpers ─── */
    .flex       { display: flex; }
    .flex-col   { flex-direction: column; }
    .flex-1     { flex: 1 1 0%; }
    .items-center { align-items: center; }
    .items-start  { align-items: flex-start; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .justify-end    { justify-content: flex-end; }
    .flex-wrap  { flex-wrap: wrap; }
    .shrink-0   { flex-shrink: 0; }
    .relative   { position: relative; }
    .absolute   { position: absolute; }
    .fixed      { position: fixed; }
    .sticky     { position: sticky; }
    .inset-0    { inset: 0; }
    .overflow-hidden { overflow: hidden; }
    .overflow-auto   { overflow: auto; }
    .pointer-events-none { pointer-events: none; }
    .z-10 { z-index: 10; }
    .z-20 { z-index: 20; }
    .z-30 { z-index: 30; }
    .z-50 { z-index: 50; }
    .z-100 { z-index: 100; }
    .w-full     { width: 100%; }
    .h-full     { height: 100%; }
    .min-h-screen { min-height: 100vh; }
    .max-w-md   { max-width: 28rem; }
    .max-w-5xl  { max-width: 64rem; }
    .max-w-7xl  { max-width: 80rem; }
    .mx-auto    { margin-left: auto; margin-right: auto; }
    .text-center { text-align: center; }
    .text-left   { text-align: left; }
    .text-right  { text-align: right; }
    .truncate   { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    .uppercase  { text-transform: uppercase; }
    .italic     { font-style: italic; }
    .leading-tight { line-height: 1.25; }
    .leading-relaxed { line-height: 1.625; }
    .cursor-pointer { cursor: pointer; }

    /* Borders */
    .rounded-full  { border-radius: 9999px; }
    .rounded-xl    { border-radius: 0.75rem; }
    .rounded-2xl   { border-radius: 1rem; }
    .rounded-3xl   { border-radius: 1.5rem; }
    .rounded-4rem  { border-radius: 2rem; }
    .rounded-lg    { border-radius: 0.5rem; }
    .border         { border-width: 1px; }
    .border-2       { border-width: 2px; }
    .border-dashed  { border-style: dashed; }
    .border-none    { border: none; }

    /* Spacing tokens */
    .p-1    { padding: 0.25rem; }
    .p-2    { padding: 0.5rem; }
    .p-4    { padding: 1rem; }
    .p-6    { padding: 1.5rem; }
    .p-8    { padding: 2rem; }
    .p-10   { padding: 2.5rem; }
    .p-16   { padding: 4rem; }
    .px-4   { padding-left:1rem; padding-right:1rem; }
    .px-5   { padding-left:1.25rem; padding-right:1.25rem; }
    .px-6   { padding-left:1.5rem; padding-right:1.5rem; }
    .px-8   { padding-left:2rem; padding-right:2rem; }
    .py-1   { padding-top:.25rem; padding-bottom:.25rem; }
    .py-2   { padding-top:.5rem; padding-bottom:.5rem; }
    .py-3   { padding-top:.75rem; padding-bottom:.75rem; }
    .py-3\.5 { padding-top:.875rem; padding-bottom:.875rem; }
    .py-4   { padding-top:1rem; padding-bottom:1rem; }
    .pl-4   { padding-left:1rem; }
    .pl-12  { padding-left:3rem; }
    .pr-4   { padding-right:1rem; }
    .pt-4   { padding-top:1rem; }
    .pb-0   { padding-bottom:0; }
    .mb-1   { margin-bottom:.25rem; }
    .mb-2   { margin-bottom:.5rem; }
    .mb-4   { margin-bottom:1rem; }
    .mb-6   { margin-bottom:1.5rem; }
    .mb-8   { margin-bottom:2rem; }
    .mb-10  { margin-bottom:2.5rem; }
    .mt-2   { margin-top:.5rem; }
    .mt-4   { margin-top:1rem; }
    .ml-1   { margin-left:.25rem; }
    .gap-1   { gap:.25rem; }
    .gap-1\.5 { gap:.375rem; }
    .gap-2   { gap:.5rem; }
    .gap-3   { gap:.75rem; }
    .gap-4   { gap:1rem; }
    .gap-5   { gap:1.25rem; }
    .gap-6   { gap:1.5rem; }
    .space-y-3 > * + * { margin-top: .75rem; }
    .space-y-5 > * + * { margin-top: 1.25rem; }

    /* Typography */
    .text-xs   { font-size:.75rem; line-height:1rem; }
    .text-sm   { font-size:.875rem; line-height:1.25rem; }
    .text-base { font-size:1rem; line-height:1.5rem; }
    .text-lg   { font-size:1.125rem; line-height:1.75rem; }
    .text-xl   { font-size:1.25rem; line-height:1.75rem; }
    .text-2xl  { font-size:1.5rem; line-height:2rem; }
    .text-3xl  { font-size:1.875rem; line-height:2.25rem; }
    .text-4xl  { font-size:2.25rem; line-height:2.5rem; }
    .text-6xl  { font-size:3.75rem; line-height:1; }
    .font-medium { font-weight:500; }
    .font-semibold { font-weight:600; }
    .font-bold   { font-weight:700; }
    .font-black  { font-weight:900; }
    .tracking-tight   { letter-spacing:-.025em; }
    .tracking-wide    { letter-spacing:.025em; }
    .tracking-wider   { letter-spacing:.05em; }
    .tracking-widest  { letter-spacing:.1em; }

    /* Colors */
    .text-white      { color:#fff; }
    .text-slate-300  { color:#cbd5e1; }
    .text-slate-400  { color:#94a3b8; }
    .text-slate-500  { color:#64748b; }
    .text-slate-600  { color:#475569; }
    .text-slate-800  { color:#1e293b; }
    .text-emerald-400 { color:#34d399; }
    .text-emerald-200 { color:#a7f3d0; }
    .text-blue-400   { color:#60a5fa; }
    .text-blue-500   { color:#3b82f6; }
    .text-red-400    { color:#f87171; }
    .text-red-300    { color:#fca5a5; }
    .text-red-500    { color: #ef4444; }
    .text-yellow-200 { color:#fef08a; }
    .text-orange-200 { color:#fed7aa; }
    .text-slate-200  { color:#e2e8f0; }
    .text-gray-300   { color:#d1d5db; }
    .text-indigo-400 { color:#818cf8; }
    .opacity-20 { opacity:.2; }
    .opacity-60 { opacity:.6; }
    .opacity-80 { opacity:.8; }
    .drop-shadow-md { filter: drop-shadow(0 4px 3px rgba(0,0,0,0.07)) drop-shadow(0 2px 2px rgba(0,0,0,0.06)); }

    /* Backgrounds */
    .bg-slate-950 { background-color:#020617; }
    .bg-slate-900 { background-color:#0f172a; }
    .bg-slate-800 { background-color:#1e293b; }
    .bg-slate-700 { background-color:#334155; }
    .bg-white     { background-color:#fff; }
    .bg-transparent { background: transparent; }
    .bg-emerald-600 { background-color:#059669; }
    .bg-blue-600    { background-color:#2563eb; }
    .bg-red-500     { background-color:#ef4444; }

    /* Gradient helpers (inline styles used where needed) */
    .gradient-text-emerald {
      background: linear-gradient(135deg, #6ee7b7, #fff, #6ee7b7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Transition */
    .transition      { transition: all 150ms cubic-bezier(0.4,0,0.2,1); }
    .transition-colors { transition: color 150ms, background-color 150ms, border-color 150ms; }
    .transition-all  { transition: all 150ms cubic-bezier(0.4,0,0.2,1); }
    .duration-500 { transition-duration: 500ms; }
    .duration-700 { transition-duration: 700ms; }

    /* Transform */
    .transform { transform: translateZ(0); }
    .rotate-3   { transform: rotate(3deg); }
    .-rotate-3  { transform: rotate(-3deg); }
    .scale-100  { transform: scale(1); }
    .translate-y-0  { transform: translateY(0); }
    .translate-y-20 { transform: translateY(5rem); }
    .scale-95  { transform: scale(0.95); }

    /* Input styles */
    input, button { font-family: inherit; }
    input:focus { outline: none; }

    /* Grid */
    .grid { display: grid; }
    .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
    @media (min-width: 1280px) {
      .xl-grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 768px) {
      .md-flex-row  { flex-direction: row; }
      .md-items-center { align-items: center; }
      .md-text-6xl  { font-size: 3.75rem; line-height: 1; }
      .md-text-2xl  { font-size: 1.5rem; line-height: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Lucide Icon Wrapper ── */
    function Icon({ name, size = 24, className = '', style = {} }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const svg = lucide.createElement(lucide[name]);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          svg.style.verticalAlign = 'middle';
          if (className) svg.setAttribute('class', className);
          Object.assign(svg.style, style);
          ref.current.appendChild(svg);
        }
      }, [name, size, className]);
      return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', ...style }}></span>;
    }

    /* ── DATA AWAL (14 Menu) ── */
    const INITIAL_FOODS = [
      { id:'f1',  name:'Nasi Goreng Spesial',   table:'01', cook:'Budi Santoso',   votes:120, token:'ng123' },
      { id:'f2',  name:'Sate Ayam Madura',       table:'02', cook:'Siti Aminah',    votes:110, token:'sa456' },
      { id:'f3',  name:'Rendang Daging',         table:'03', cook:'Andi Wijaya',    votes:105, token:'rd789' },
      { id:'f4',  name:'Gado-Gado Betawi',       table:'04', cook:'Rina Melati',    votes:100, token:'gg012' },
      { id:'f5',  name:'Soto Lamongan',          table:'05', cook:'Dewi Lestari',   votes:95,  token:'sl345' },
      { id:'f6',  name:'Ayam Geprek',            table:'06', cook:'Fajar Pratama',  votes:80,  token:'ag678' },
      { id:'f7',  name:'Bakso Malang',           table:'07', cook:'Hendra Gunawan', votes:75,  token:'bm901' },
      { id:'f8',  name:'Pempek Palembang',       table:'08', cook:'Lina Marlina',   votes:65,  token:'pp234' },
      { id:'f9',  name:'Nasi Padang',            table:'09', cook:'Reza Pahlevi',   votes:55,  token:'np567' },
      { id:'f10', name:'Mie Goreng Jawa',        table:'10', cook:'Sari Ayu',       votes:45,  token:'mj890' },
      { id:'f11', name:'Seblak Pedas',           table:'11', cook:'Dinda Kirana',   votes:30,  token:'sp123' },
      { id:'f12', name:'Sate Padang',            table:'12', cook:'Taufik Hidayat', votes:25,  token:'sp456' },
      { id:'f13', name:'Ayam Bakar Taliwang',    table:'13', cook:'Maya Sophia',    votes:20,  token:'ab789' },
      { id:'f14', name:'Nasi Kuning',            table:'14', cook:'Gilang Ramadhan',votes:10,  token:'nk012' },
    ];

    /* ═══════════════════════════════════════════
       ROOT APP
    ═══════════════════════════════════════════ */
    function App() {
      const [currentView, setCurrentView] = useState('projector');
      const [foods, setFoods] = useState([]);
      const [voteStatus, setVoteStatus] = useState({ status:'', message:'', foodName:'' });

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const voteToken = params.get('vote');
        if (voteToken) {
          handleDirectVote(voteToken);
          setCurrentView('vote');
        } else {
          const stored = localStorage.getItem('ukk_foods_data');
          if (stored) { setFoods(JSON.parse(stored)); }
          else { setFoods(INITIAL_FOODS); localStorage.setItem('ukk_foods_data', JSON.stringify(INITIAL_FOODS)); }
        }
        const onStorage = (e) => {
          if (e.key === 'ukk_foods_data') setFoods(JSON.parse(e.newValue));
        };
        window.addEventListener('storage', onStorage);
        return () => window.removeEventListener('storage', onStorage);
      }, []);

      const handleDirectVote = (token) => {
        const stored = JSON.parse(localStorage.getItem('ukk_foods_data')) || INITIAL_FOODS;
        const idx = stored.findIndex(f => f.token === token);
        if (idx !== -1) {
          const food = stored[idx];
          const deviceId = localStorage.getItem('device_id') || Math.random().toString(36).substring(2);
          localStorage.setItem('device_id', deviceId);
          const voteKey = `voted_${food.id}`;
          if (localStorage.getItem(voteKey)) {
            setVoteStatus({ status:'error', message:'Anda sudah pernah memvoting', foodName: food.name });
            return;
          }
          stored[idx].votes += 1;
          localStorage.setItem('ukk_foods_data', JSON.stringify(stored));
          localStorage.setItem(voteKey, 'true');
          localStorage.setItem('ukk_last_vote', JSON.stringify({ name: food.name, cook: food.cook, table: food.table, time: Date.now() }));
          setVoteStatus({ status:'success', message:'Vote berhasil ditambahkan untuk', foodName: food.name });
        } else {
          setVoteStatus({ status:'error', message:'Token tidak valid / Menu tidak ditemukan!', foodName:'' });
        }
      };

      const navigate = (view) => {
        try { window.history.pushState({}, '', window.location.pathname); } catch(e) {}
        setCurrentView(view);
      };

      return (
        <div style={{ minHeight:'100vh', background:'#020617', color:'#fff', fontFamily:"'Inter',sans-serif", display:'flex', flexDirection:'column', userSelect:'none' }}>
          {/* ── NAVBAR ── */}
          {currentView !== 'vote' && (
            <nav className="glass-panel" style={{
              padding:'1rem 1.5rem', display:'flex', justifyContent:'space-between', alignItems:'center',
              position:'sticky', top:0, zIndex:50, borderBottom:'1px solid rgba(255,255,255,0.1)',
              boxShadow:'0 4px 32px rgba(0,0,0,0.4)'
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'0.75rem' }}>
                <div style={{ background:'rgba(52,211,153,0.15)', padding:'0.5rem', borderRadius:'0.75rem', border:'1px solid rgba(52,211,153,0.3)', display:'flex' }}>
                  <Icon name="ChefHat" size={24} style={{ color:'#34d399' }} />
                </div>
                <div>
                  <h1 style={{ fontWeight:900, fontSize:'1.25rem', letterSpacing:'0.05em',
                    background:'linear-gradient(90deg,#34d399,#67e8f9)', WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent' }}>
                    UKK KULINER
                  </h1>
                  <p style={{ fontSize:'0.65rem', color:'#94a3b8', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em' }}>Live Voting System</p>
                </div>
              </div>

              <div style={{ display:'flex', gap:'0.5rem', background:'rgba(15,23,42,0.5)', padding:'0.375rem', borderRadius:'1rem', border:'1px solid rgba(255,255,255,0.05)' }}>
                {[
                  { id:'projector', label:'Proyektor', icon:'MonitorPlay', active:'#10b981', shadow:'rgba(16,185,129,0.4)' },
                  { id:'admin',     label:'Admin',     icon:'Settings',    active:'#2563eb', shadow:'rgba(37,99,235,0.4)' },
                ].map(tab => {
                  const isActive = currentView === tab.id;
                  return (
                    <button key={tab.id} onClick={() => navigate(tab.id)} style={{
                      padding:'0.6rem 1.25rem', borderRadius:'0.75rem', display:'flex', alignItems:'center', gap:'0.5rem',
                      fontWeight:600, fontSize:'0.875rem', border:'none', cursor:'pointer',
                      background: isActive ? tab.active : 'transparent',
                      color: isActive ? '#fff' : '#94a3b8',
                      boxShadow: isActive ? `0 0 20px ${tab.shadow}` : 'none',
                      transition:'all 200ms'
                    }}>
                      <Icon name={tab.icon} size={18} />
                      {tab.label}
                    </button>
                  );
                })}
              </div>
            </nav>
          )}

          <main style={{ flex:1, display:'flex', flexDirection:'column', position:'relative', overflow:'hidden' }}>
            {currentView === 'projector' && <ProjectorDisplay foods={foods} />}
            {currentView === 'admin'     && <AdminPanel foods={foods} setFoods={setFoods} />}
            {currentView === 'vote'      && <VoteSuccess status={voteStatus} onBack={() => navigate('projector')} />}
          </main>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       1. PROJECTOR DISPLAY
    ═══════════════════════════════════════════ */
    function ProjectorDisplay({ foods }) {
      const [sortedFoods, setSortedFoods] = useState([]);
      const [lastVoteMsg, setLastVoteMsg] = useState(null);
      const [soundEnabled, setSoundEnabled] = useState(false);
      const prevVotesRef = useRef({});

      const playTing = () => {
        if (!soundEnabled) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.setValueAtTime(1046.50, ctx.currentTime);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
        } catch(e) {}
      };

      useEffect(() => {
        const sorted = [...foods].sort((a,b) => b.votes - a.votes);
        setSortedFoods(sorted);
        let changed = false;
        foods.forEach(f => {
          const prev = prevVotesRef.current[f.id] || 0;
          if (f.votes > prev) {
            changed = true;
            const el = document.getElementById(`food-card-${f.id}`);
            if (el) { el.classList.remove('animate-flash'); void el.offsetWidth; el.classList.add('animate-flash'); }
          }
          prevVotesRef.current[f.id] = f.votes;
        });
        if (changed) playTing();
      }, [foods]);

      useEffect(() => {
        const check = () => {
          const last = localStorage.getItem('ukk_last_vote');
          if (last) {
            const d = JSON.parse(last);
            if (Date.now() - d.time < 4000) {
              setLastVoteMsg(`🔥 +1 Vote untuk ${d.name} (Meja ${d.table||'-'} – ${d.cook})`);
              setTimeout(() => setLastVoteMsg(null), 3500);
            }
          }
        };
        window.addEventListener('storage', check);
        return () => window.removeEventListener('storage', check);
      }, []);

      const ITEM_H = 76, ITEM_GAP = 16, START_Y = 20;

      const rankStyle = (rank) => {
        if (rank === 1) return {
          bg: 'linear-gradient(90deg,#f59e0b,#d97706)', border:'rgba(251,191,36,0.5)',
          shadow:'0 0 30px rgba(245,158,11,0.4)', scale:1.04, z:30, rankColor:'#fef08a', icon:'Trophy'
        };
        if (rank === 2) return {
          bg: 'linear-gradient(90deg,#94a3b8,#64748b)', border:'rgba(203,213,225,0.5)',
          shadow:'0 0 20px rgba(148,163,184,0.3)', scale:1.02, z:20, rankColor:'#e2e8f0', icon:'Medal'
        };
        if (rank === 3) return {
          bg: 'linear-gradient(90deg,#f97316,#dc2626)', border:'rgba(251,146,60,0.5)',
          shadow:'0 0 20px rgba(249,115,22,0.3)', scale:1.01, z:10, rankColor:'#fed7aa', icon:'Medal'
        };
        if (rank <= 5) return {

              const rs = rankStyle(rank);
              const topPos = START_Y + i * (ITEM_H + ITEM_GAP);

                <div

                    top:`${topPos}px`,
                    transition:'top 700ms cubic-bezier(0.34,1.56,0.64,1), transform 700ms cubic-bezier(0.34,1.56,0.64,1)',
                  }}
                >
                  {/* Rank */}
                  <div style={{ width:'3.5rem', fontSize:'1.875rem', fontWeight:900, fontStyle:'italic', color:rs.rankColor, fontVariantNumeric:'tabular-nums' }}>
                    #{rank}

                  {/* Name & Cook */}
                  <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'0.125rem' }}>
                    <div style={{ fontSize:'clamp(1rem,2.5vw,1.5rem)', fontWeight:700, letterSpacing:'0.02em', display:'flex', alignItems:'center', gap:'0.75rem' }}>
                      {food.name}
                      {rs.icon && <Icon name={rs.icon} size={rank===1?24:20} className={rank===1?'animate-crown':''} style={{ color: rs.rankColor }}/>}
                    </div>
                    <div style={{ fontSize:'0.875rem', fontWeight:500, display:'flex', alignItems:'center', gap:'0.375rem', color: rank<=3?'rgba(255,255,255,0.8)':'#94a3b8' }}>

                  {/* Score */}
                  <div style={{ fontSize:'clamp(1.5rem,4vw,2.5rem)', fontWeight:900, fontFamily:'monospace', letterSpacing:'-0.05em',
                    color: rank===1?'#fff':rank<=3?'rgba(255,255,255,.9)':'#34d399' }}>
                    {food.votes} <span style={{ fontSize:'0.75rem', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', opacity:.6, marginLeft:'0.25rem' }}>Pts</span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Last Vote Popup */}
          <div style={{
            position:'fixed', bottom:'2.5rem', left:'50%', transform: lastVoteMsg
              ? 'translateX(-50%) translateY(0) scale(1)'
              : 'translateX(-50%) translateY(5rem) scale(0.95)',
            opacity: lastVoteMsg ? 1 : 0,
            transition:'all 500ms cubic-bezier(0.34,1.56,0.64,1)',
            pointerEvents: lastVoteMsg ? 'auto' : 'none',
            zIndex:50

            <div style={{ background:'rgba(15,23,42,0.95)', border:'1px solid rgba(52,211,153,0.3)', color:'#fff',
              padding:'1rem 2rem', borderRadius:'1rem', boxShadow:'0 10px 40px rgba(16,185,129,0.3)',
              fontWeight:700, display:'flex', alignItems:'center', gap:'1rem', backdropFilter:'blur(16px)', whiteSpace:'nowrap' }}>
              <div style={{ width:'2.5rem', height:'2.5rem', background:'rgba(52,211,153,0.2)', color:'#34d399',
                borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <Icon name="Trophy" size={20} />
              </div>
              <span style={{ fontSize:'1rem', letterSpacing:'0.02em' }}>{lastVoteMsg}</span>
            </div>
          </div>
        </div>
      );
    }

              <div style={{ background:'rgba(239,68,68,0.1)', color:'#f87171', padding:'1rem', borderRadius:'0.75rem',

              ].map((f,i) => (
                <div key={i} style={{ position:'relative' }}>

                  <input type={f.type} value={f.val} onChange={e => f.set(e.target.value)}

                    onBlur={e => e.target.style.borderColor='#334155'} />
                </div>
              ))}
              <button type="submit" style={{
                width:'100%', background:'linear-gradient(90deg,#2563eb,#4f46e5)',
                color:'#fff', fontWeight:700, padding:'1rem', borderRadius:'1rem', border:'none', cursor:'pointer',

    function AdminDashboard({ foods, setFoods, onLogout }) {
      const [copiedToken, setCopiedToken] = useState('');

      const baseUrl = window.location.href.split('?')[0];

      const resetVotes = () => {
        if (confirm('⚠️ PERINGATAN: Yakin ingin mereset semua vote menjadi 0?')) {
          const r = foods.map(f => ({ ...f, votes:0 }));
          setFoods(r); localStorage.setItem('ukk_foods_data', JSON.stringify(r));
          Object.keys(localStorage).forEach(k => { if (k.startsWith('voted_')) localStorage.removeItem(k); });
        }
      };

      const copyLink = (token) => {
        navigator.clipboard.writeText(`${baseUrl}?vote=${token}`);
        setCopiedToken(token); setTimeout(() => setCopiedToken(''), 2000);

      const handleDelete = (id, name) => {
        if (confirm(`Hapus menu "${name}" secara permanen?`)) {
          const nd = foods.filter(f => f.id !== id);

                    onMouseLeave={e => { e.currentTarget.style.color='#94a3b8'; e.currentTarget.style.borderColor='#334155'; }}>

                            <div style={{ marginTop:'1rem', display:'inline-flex', alignItems:'center', gap:'0.75rem', background:'#0f172a', padding:'0.5rem 1rem', borderRadius:'0.75rem', border:'1px solid #1e293b' }}>

      const [table, setTable] = useState('');

        e.preventDefault();

        const token = Math.random().toString(36).substr(2, 6);
        onAdd({ id:`f_${Date.now()}`, name, cook, table, votes:0, token });

            </button>
            <h3 style={{ fontSize:'1.5rem', fontWeight:700, color:'#fff', marginBottom:'1.5rem', display:'flex', alignItems:'center', gap:'0.75rem' }}>
              <Icon name="Utensils" size={24} style={{ color:'#34d399' }} /> Tambah Menu Baru
            </h3>
            <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:'1.25rem' }}>
              {[
                { label:'Nama Menu Makanan', val:name, set:setName, ph:'Misal: Sate Lilit Khas Bali', autoFocus:true },
                { label:'Nomor Meja', val:table, set:setTable, ph:'Misal: 01' },
                { label:'Nama Siswa / Koki', val:cook, set:setCook, ph:'Misal: Ahmad Dhani' },
              ].map((f,i) => (
                <div key={i}>
                  <label style={{ display:'block', color:'#cbd5e1', fontWeight:500, marginBottom:'0.5rem' }}>{f.label}</label>
                  <input type="text" autoFocus={f.autoFocus} value={f.val} onChange={e=>f.set(e.target.value)}
                    style={inputStyle} placeholder={f.ph} required
                    onFocus={e => e.target.style.borderColor='#10b981'}
                    onBlur={e => e.target.style.borderColor='#334155'} />
                </div>
              ))}
              <button type="submit" style={{ width:'100%', background:'#059669', color:'#fff', fontWeight:700, padding:'0.875rem', borderRadius:'0.75rem', border:'none', cursor:'pointer', fontSize:'1rem', boxShadow:'0 0 15px rgba(16,185,129,0.3)', transition:'all 200ms', marginTop:'0.5rem' }}
                onMouseEnter={e => { e.currentTarget.style.background='#10b981'; e.currentTarget.style.boxShadow='0 0 25px rgba(16,185,129,0.5)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='#059669'; e.currentTarget.style.boxShadow='0 0 15px rgba(16,185,129,0.3)'; }}>
                Simpan & Generate QR
              </button>
            </form>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       3. VOTE SUCCESS SCREEN
    ═══════════════════════════════════════════ */
    function VoteSuccess({ status, onBack }) {
      const ok = status.status === 'success';
      const accent = ok ? '#10b981' : '#ef4444';

      return (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', background:'#020617', padding:'1.5rem', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', inset:0, opacity:.2, pointerEvents:'none',
            background: ok ? 'radial-gradient(circle at center, #059669 0%, #020617 70%)' : 'radial-gradient(circle at center, #dc2626 0%, #020617 70%)',
            transition:'background 1s' }}/>

          <div className="glass-panel animate-slideUp" style={{ padding:'2.5rem', borderRadius:'2.5rem', maxWidth:'28rem', width:'100%', textAlign:'center', position:'relative', zIndex:10,
            border:`1px solid ${ok?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'}`,
            boxShadow: ok ? '0 20px 50px rgba(16,185,129,0.15)' : '0 20px 50px rgba(239,68,68,0.15)' }}>
            <div style={{ display:'flex', justifyContent:'center', marginBottom:'1.5rem' }}>
              <div style={{ width:'7rem', height:'7rem', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', position:'relative',
                background: ok ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)', color: accent }}>
                <div className="animate-ping" style={{ position:'absolute', inset:0, borderRadius:'50%', background: ok ? '#34d399' : '#f87171', opacity:.2 }}/>
                <Icon name={ok ? 'CheckCircle2' : 'XCircle'} size={56} style={{ position:'relative', zIndex:10, color: accent }} />
              </div>
            </div>

            <h2 style={{ fontSize:'1.875rem', fontWeight:900, color:'#fff', marginBottom:'0.75rem', letterSpacing:'-0.02em' }}>
              {ok ? 'Vote Diterima!' : 'Gagal Menyimpan'}
            </h2>
            <div style={{ marginBottom:'2rem' }}>
              <p style={{ color:'#94a3b8', fontSize:'1.125rem' }}>{status.message}</p>
              {status.foodName && (
                <p style={{ fontSize:'1.5rem', fontWeight:700, marginTop:'0.5rem', color: accent }}>
                  "{status.foodName}"
                </p>
              )}
            </div>
            <div style={{ background:'rgba(15,23,42,0.5)', borderRadius:'1rem', padding:'1rem', marginBottom:'2rem', border:'1px solid rgba(255,255,255,0.05)' }}>
              <p style={{ fontSize:'0.875rem', color:'#94a3b8', lineHeight:1.625 }}>
                {ok
                  ? 'Terima kasih atas partisipasi Anda! Poin telah ditambahkan secara real-time ke layar utama.'
                  : 'Sistem mendeteksi bahwa perangkat ini sudah pernah memberikan suara. Satu perangkat hanya berlaku untuk satu vote per menu.'}
              </p>
            </div>
            <button onClick={onBack} style={{ width:'100%', background:'#1e293b', color:'#fff', fontWeight:700, padding:'1rem 1.5rem', borderRadius:'1rem', border:'1px solid #334155', cursor:'pointer', fontSize:'1rem', transition:'all 200ms' }}
              onMouseEnter={e => { e.currentTarget.style.background='#334155'; e.currentTarget.style.borderColor='#475569'; }}
              onMouseLeave={e => { e.currentTarget.style.background='#1e293b'; e.currentTarget.style.borderColor='#334155'; }}>
              Tutup & Kembali
            </button>
          </div>
        </div>
      );
    }

    /* ── Mount ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
