<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Leaderboard – UKK Kuliner</title>
  <meta name="description" content="Tampilan leaderboard live real-time untuk voting UKK Kuliner." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Icon wrapper ── */
    function Icon({ name, size = 24, style = {}, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !window.lucide?.[name]) return;
        ref.current.innerHTML = '';
        const svg = window.lucide.createElement(window.lucide[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        if (className) svg.setAttribute('class', className);
        Object.assign(svg.style, style);
        ref.current.appendChild(svg);
      }, [name, size, className]);
      return <span ref={ref} className="icon" />;
    }

    /* ── Rank styling ── */
    const RANK_STYLES = {
      1: {
        bg: 'linear-gradient(90deg,#f59e0b,#d97706)', border:'rgba(251,191,36,0.5)',
        shadow:'0 0 30px rgba(245,158,11,0.4)', scale:1.04, z:30,
        rankColor:'#fef08a', scoreColor:'#fff', cookColor:'rgba(255,255,255,0.8)',
        icon:'Trophy', iconClass:'animate-crown',
      },
      2: {
        bg:'linear-gradient(90deg,#94a3b8,#64748b)', border:'rgba(203,213,225,0.5)',
        shadow:'0 0 20px rgba(148,163,184,0.3)', scale:1.02, z:20,
        rankColor:'#e2e8f0', scoreColor:'rgba(255,255,255,0.9)', cookColor:'rgba(255,255,255,0.8)',
        icon:'Medal', iconClass:'',
      },
      3: {
        bg:'linear-gradient(90deg,#f97316,#dc2626)', border:'rgba(251,146,60,0.5)',
        shadow:'0 0 20px rgba(249,115,22,0.3)', scale:1.01, z:10,
        rankColor:'#fed7aa', scoreColor:'rgba(255,255,255,0.9)', cookColor:'rgba(255,255,255,0.8)',
        icon:'Medal', iconClass:'',
      },
    };

    function getRankStyle(rank) {
      if (RANK_STYLES[rank]) return RANK_STYLES[rank];
      if (rank <= 5) return { bg:'linear-gradient(90deg,#059669,#0f766e)', border:'rgba(52,211,153,0.3)', shadow:'0 2px 12px rgba(0,0,0,0.25)', scale:1, z:1, rankColor:'#a7f3d0', scoreColor:'#34d399', cookColor:'#94a3b8', icon:null, iconClass:'' };
      return { bg:'rgba(255,255,255,0.04)', border:'rgba(255,255,255,0.08)', shadow:'none', scale:1, z:1, rankColor:'#64748b', scoreColor:'#34d399', cookColor:'#64748b', icon:null, iconClass:'' };
    }

    const ITEM_H = 76, ITEM_GAP = 16, START_Y = 16;

    /* ════════════════════════════════════════════
       ProjectorDisplay
    ════════════════════════════════════════════ */
    function ProjectorDisplay() {
      const [foods,   setFoods]   = useState([]);
      const [sorted,  setSorted]  = useState([]);
      const [lastMsg, setLastMsg] = useState(null);
      const [sound,   setSound]   = useState(false);
      const [loading, setLoading] = useState(true);
      const prevRef   = useRef({});
      const soundRef  = useRef(false);

      // Sinkronisasi soundRef dengan state
      useEffect(() => { soundRef.current = sound; }, [sound]);

      // Real-time listener Firebase untuk foods
      useEffect(() => {
        const unsubscribe = onFoodsChange((data) => {
          setFoods(data);
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      // Listener notifikasi vote terakhir
      useEffect(() => {
        let lastTimestamp = 0;
        const unsubscribe = onLastVoteChange((d) => {
          const ts = d.timestamp || 0;
          if (ts <= lastTimestamp) return;
          lastTimestamp = ts;
          setLastMsg(`🔥 +1 Vote untuk ${d.name} (Meja ${d.table||'-'} – ${d.cook})`);
          if (soundRef.current) playTing();
          setTimeout(() => setLastMsg(null), 3500);
        });
        return unsubscribe;
      }, []);

      // Sort + flash animation saat data berubah
      useEffect(() => {
        const s = [...foods].sort((a, b) => b.votes - a.votes);
        setSorted(s);
        foods.forEach(f => {
          const prev = prevRef.current[f.id] || 0;
          if (f.votes > prev) {
            const el = document.getElementById(`fc-${f.id}`);
            if (el) { el.classList.remove('animate-flash'); void el.offsetWidth; el.classList.add('animate-flash'); }
          }
          prevRef.current[f.id] = f.votes;
        });
      }, [foods]);

      function playTing() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.value = 1046.5;
          g.gain.setValueAtTime(0.3, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
          osc.start(); osc.stop(ctx.currentTime + 0.5);
        } catch(e) {}
      }

      return (
        <div className="page-wrapper">
          <nav className="navbar glass-panel">
            <div className="navbar-brand">
              <div className="navbar-logo"><Icon name="ChefHat" size={24} style={{ color:'#34d399' }}/></div>
              <div>
                <div className="navbar-title">UKK KULINER</div>
                <div className="navbar-subtitle">Live Voting System</div>
              </div>
            </div>
            <div className="navbar-actions">
              <a href="admin.html" className="btn btn-ghost" style={{ textDecoration:'none' }}>
                <Icon name="Settings" size={16}/> Admin Panel
              </a>
            </div>
          </nav>

          <div className="projector-bg">
            <div className="projector-orb-1"/><div className="projector-orb-2"/>

            <div className="projector-header animate-slide-up">
              <h1 className="projector-title">LIVE RANKING LEADERBOARD</h1>
              <div className="live-badge">
                <span className="live-dot animate-pulse"/>
                <span className="live-text">REAL-TIME UPDATE</span>
              </div>
            </div>

            <button className={`sound-toggle${sound?' on':''}`} onClick={() => setSound(s=>!s)}>
              <Icon name={sound?'Volume2':'VolumeX'} size={16}/> Sound {sound?'ON':'OFF'}
            </button>

            {/* Loading State */}
            {loading && (
              <div style={{ textAlign:'center', padding:'4rem', color:'#64748b' }}>
                <div style={{ width:'3rem',height:'3rem',border:'3px solid rgba(255,255,255,.1)',borderTopColor:'#34d399',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 1rem' }}/>
                <p>Memuat data dari Firebase…</p>
              </div>
            )}

            {/* Empty State */}
            {!loading && sorted.length === 0 && (
              <div style={{ textAlign:'center', padding:'4rem', color:'#64748b' }}>
                <div style={{ fontSize:'4rem',marginBottom:'1rem' }}>🍽️</div>
                <p style={{ fontSize:'1.25rem', fontWeight:600 }}>Belum ada menu terdaftar</p>
                <p style={{ marginTop:'.5rem' }}>Tambahkan menu dari <a href="admin.html" style={{ color:'#34d399' }}>Admin Panel</a></p>
              </div>
            )}

            {/* Leaderboard */}
            {!loading && sorted.length > 0 && (
              <div className="leaderboard-container" style={{ height:`${sorted.length*(ITEM_H+ITEM_GAP)+START_Y}px` }}>
                {sorted.map((food, i) => {
                  const rank = i + 1, rs = getRankStyle(rank);
                  return (
                    <div id={`fc-${food.id}`} key={food.id} className="leaderboard-card" style={{
                      top:`${START_Y+i*(ITEM_H+ITEM_GAP)}px`, height:`${ITEM_H}px`,
                      background:rs.bg, borderColor:rs.border, boxShadow:rs.shadow,
                      transform:`scale(${rs.scale})`, zIndex:rs.z,
                    }}>
                      <div className="card-rank" style={{ color:rs.rankColor }}>#{rank}</div>
                      <div className="card-info">
                        <div className="card-name">
                          {food.name}
                          {rs.icon && <Icon name={rs.icon} size={rank===1?24:20} className={rs.iconClass} style={{ color:rs.rankColor }}/>}
                        </div>
                        <div className="card-cook" style={{ color:rs.cookColor }}>
                          <Icon name="ChefHat" size={13} style={{ opacity:.8 }}/>
                          Meja {food.table||'-'} : {food.cook||'Siswa'}
                        </div>
                      </div>
                      <div className="card-score" style={{ color:rs.scoreColor }}>
                        {food.votes}<span className="card-score-unit">Pts</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Last Vote Toast */}
            <div className="last-vote-popup" style={{
              transform:lastMsg?'translateX(-50%) translateY(0) scale(1)':'translateX(-50%) translateY(6rem) scale(0.9)',
              opacity:lastMsg?1:0,
            }}>
              <div className="last-vote-inner">
                <div className="last-vote-icon"><Icon name="Trophy" size={20}/></div>
                <span>{lastMsg}</span>
              </div>
            </div>
          </div>

          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ProjectorDisplay/>);
  </script>
</body>
</html>
