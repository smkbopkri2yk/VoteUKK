<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Live Leaderboard – UKK Kuliner</title>
  <meta name="description" content="Ranking live voting UKK Kuliner secara real-time." />
  <meta name="theme-color" content="#020617" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%; font-family: 'Inter', sans-serif; background: #020617; color: #fff;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    #root { height: 100%; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    @keyframes floatCrown { 0%,100% { transform:translateY(0) rotate(-2deg); } 50% { transform:translateY(-3px) rotate(4deg); } }
    @keyframes flash { 0% { filter:brightness(1); } 40% { filter:brightness(1.55) saturate(1.3); } 100% { filter:brightness(1); } }
    @keyframes toastIn { from { transform:translateX(-50%) translateY(80px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }
    @keyframes myVotePulse { 0%,100% { box-shadow:0 0 0 0 rgba(234,179,8,0.4); } 50% { box-shadow:0 0 0 6px rgba(234,179,8,0); } }
    @keyframes spin { to { transform:rotate(360deg); } }

    .animate-flash  { animation: flash 0.9s ease-out; }
    .animate-crown  { animation: floatCrown 3s ease-in-out infinite; }
    .animate-pulse  { animation: pulse 2s ease-in-out infinite; }
    .animate-my     { animation: myVotePulse 2.5s ease-in-out infinite; }

    .mobile-nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:.75rem 1rem; padding-top:max(.75rem,env(safe-area-inset-top));
      background:rgba(2,6,23,.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.07); position:sticky; top:0; z-index:40; flex-shrink:0;
    }
    .nav-brand-title { font-size:1rem; font-weight:900; letter-spacing:.04em; background:linear-gradient(90deg,#34d399,#67e8f9); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-brand-sub { font-size:.6rem; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.1em; }
    .live-pill { display:flex; align-items:center; gap:.3rem; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); padding:.3rem .625rem; border-radius:99px; font-size:.65rem; font-weight:700; color:#fca5a5; text-transform:uppercase; letter-spacing:.08em; }
    .live-dot { width:7px; height:7px; border-radius:50%; background:#ef4444; box-shadow:0 0 6px rgba(239,68,68,.8); display:inline-block; }

    .scroll-area { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }

    .section-header { padding:.875rem 1rem .625rem; display:flex; align-items:center; justify-content:space-between; }
    .section-title { font-size:.75rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.1em; }

    .update-banner { margin:0 1rem .625rem; background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.25); border-radius:.625rem; padding:.5rem .875rem; font-size:.75rem; font-weight:600; color:#34d399; display:flex; align-items:center; gap:.4rem; animation:slideDown .3s ease-out; }

    .lb-container { position:relative; padding:0 1rem; }
    .rank-card { position:absolute; left:1rem; right:1rem; border-radius:.875rem; border-width:1px; border-style:solid; display:flex; align-items:center; gap:.625rem; padding:0 .875rem; transition:top 620ms cubic-bezier(.34,1.4,.64,1), transform 620ms cubic-bezier(.34,1.4,.64,1); overflow:hidden; }
    .rank-card::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,transparent 100%); pointer-events:none; }

    .rank-badge { width:2rem; min-width:2rem; text-align:center; font-weight:900; font-style:italic; font-size:1.1rem; font-variant-numeric:tabular-nums; flex-shrink:0; }
    .card-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:.1rem; }
    .card-menu-name { font-size:.9rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:.375rem; }
    .card-cook-name { font-size:.7rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:.25rem; }
    .my-vote-badge { display:inline-flex; align-items:center; gap:.2rem; background:rgba(234,179,8,.2); border:1px solid rgba(234,179,8,.4); color:#fbbf24; border-radius:99px; padding:.1rem .4rem; font-size:.58rem; font-weight:700; white-space:nowrap; flex-shrink:0; text-transform:uppercase; letter-spacing:.04em; }
    .card-score { font-size:1.3rem; font-weight:900; font-family:monospace; letter-spacing:-.03em; font-variant-numeric:tabular-nums; flex-shrink:0; text-align:right; min-width:3rem; }
    .card-score-unit { font-size:.55rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; opacity:.55; display:block; text-align:right; }

    .rank-card.rank-1 { background:linear-gradient(105deg,#92400e,#b45309,#d97706); border-color:rgba(251,191,36,.4); box-shadow:0 4px 20px rgba(245,158,11,.3); }
    .rank-card.rank-2 { background:linear-gradient(105deg,#374151,#4b5563,#6b7280); border-color:rgba(209,213,219,.25); box-shadow:0 3px 12px rgba(107,114,128,.2); }
    .rank-card.rank-3 { background:linear-gradient(105deg,#9a3412,#c2410c,#ea580c); border-color:rgba(251,146,60,.3); box-shadow:0 3px 12px rgba(234,88,12,.2); }
    .rank-card.rank-top5 { background:linear-gradient(105deg,#065f46,#0f766e 80%); border-color:rgba(52,211,153,.2); }
    .rank-card.rank-rest { background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.06); }
    .rank-card.is-my-vote { outline:2px solid rgba(234,179,8,.6); outline-offset:1px; animation:myVotePulse 2.5s ease-in-out infinite; }

    .toast { position:fixed; bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem)); left:50%; transform:translateX(-50%); z-index:100; background:rgba(15,23,42,.97); border:1px solid rgba(52,211,153,.35); color:#fff; padding:.75rem 1.25rem; border-radius:1rem; box-shadow:0 8px 32px rgba(16,185,129,.25); font-size:.82rem; font-weight:700; display:flex; align-items:center; gap:.5rem; white-space:nowrap; max-width:calc(100vw - 2rem); overflow:hidden; text-overflow:ellipsis; animation:toastIn .4s cubic-bezier(.34,1.56,.64,1); backdrop-filter:blur(16px); }
    .toast-icon { width:1.75rem; height:1.75rem; background:rgba(52,211,153,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#34d399; }

    .my-vote-card { margin:0 1rem .75rem; background:linear-gradient(135deg,rgba(234,179,8,.1),rgba(245,158,11,.06)); border:1px solid rgba(234,179,8,.25); border-radius:.875rem; padding:.75rem 1rem; display:flex; align-items:center; gap:.625rem; animation:slideDown .4s ease-out; }
    .my-vote-icon { font-size:1.25rem; flex-shrink:0; }
    .my-vote-text { font-size:.78rem; color:#94a3b8; font-weight:500; }
    .my-vote-name { font-size:.9rem; color:#fbbf24; font-weight:700; }

    .bottom-safe { height:max(1rem,env(safe-area-inset-bottom)); flex-shrink:0; }

    .icon { display:inline-flex; align-items:center; vertical-align:middle; }
    .btn-link { background:transparent; border:none; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Icon wrapper ── */
    function Icon({ name, size = 18, style = {}, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !window.lucide?.[name]) return;
        ref.current.innerHTML = '';
        const svg = window.lucide.createElement(window.lucide[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        if (className) svg.setAttribute('class', className);
        Object.assign(svg.style, style);
        ref.current.appendChild(svg);
      }, [name, size]);
      return <span ref={ref} className={`icon ${className}`}/>;
    }

    /* ── Rank config ── */
    function getRankCfg(rank) {
      const base = {
        cardClass:  rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':rank<=5?'rank-top5':'rank-rest',
        rankColor:  rank===1?'#fef08a':rank===2?'#e2e8f0':rank===3?'#fed7aa':rank<=5?'#a7f3d0':'#64748b',
        scoreColor: rank<=3?'#fff':rank<=5?'#a7f3d0':'#34d399',
        cookColor:  rank<=3?'rgba(255,255,255,.75)':'#64748b',
        icon:       rank===1?'Trophy':rank<=3?'Medal':null,
        iconClass:  rank===1?'animate-crown':'',
        itemH:      rank<=3?68:60, itemGap:rank<=3?10:8,
      };
      return base;
    }

    function computePositions(sorted) {
      let y = 0;
      return sorted.map((food, i) => {
        const rank = i+1, cfg = getRankCfg(rank);
        const pos = { food, rank, cfg, top:y };
        y += cfg.itemH + cfg.itemGap;
        return pos;
      });
    }

    /* ════════════════════════════════════════════
       MobileLeaderboard
    ════════════════════════════════════════════ */
    function MobileLeaderboard() {
      const [foods,     setFoods]     = useState([]);
      const [positions, setPositions] = useState([]);
      const [totalH,    setTotalH]    = useState(0);
      const [toast,     setToast]     = useState(null);
      const [showBanner,setShowBanner]= useState(false);
      const [loading,   setLoading]   = useState(true);
      const toastTimer = useRef(null);
      const bannerTimer= useRef(null);
      const prevVotes  = useRef({});
      const isFirst    = useRef(true);

      const myVotedName = localStorage.getItem('ukk_voted_for') || null;

      const showToastMsg = useCallback((msg) => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast(msg);
        toastTimer.current = setTimeout(() => setToast(null), 3200);
      }, []);

      // Real-time Firebase listener
      useEffect(() => {
        const unsubscribe = onFoodsChange((data) => {
          // Tidak tampilkan banner pada load pertama
          if (!isFirst.current) {
            setShowBanner(true);
            if (bannerTimer.current) clearTimeout(bannerTimer.current);
            bannerTimer.current = setTimeout(() => setShowBanner(false), 4000);
          }
          isFirst.current = false;
          setFoods(data);
          setLoading(false);
        });
        return () => {
          unsubscribe();
          if (toastTimer.current)  clearTimeout(toastTimer.current);
          if (bannerTimer.current) clearTimeout(bannerTimer.current);
        };
      }, []);

      // Listener notifikasi vote terakhir
      useEffect(() => {
        let lastTs = 0;
        const unsubscribe = onLastVoteChange((d) => {
          const ts = d.timestamp || 0;
          if (ts <= lastTs) return;
          lastTs = ts;
          showToastMsg(`+1 Vote masuk: ${d.name}`);
        });
        return unsubscribe;
      }, [showToastMsg]);

      // Sort + compute positions + flash animation
      useEffect(() => {
        const sorted = [...foods].sort((a,b) => b.votes - a.votes);
        const pos    = computePositions(sorted);
        const h      = pos.reduce((acc,p) => acc + p.cfg.itemH + p.cfg.itemGap, 0);
        setPositions(pos);
        setTotalH(h);

        foods.forEach(f => {
          const prev = prevVotes.current[f.id] || 0;
          if (f.votes > prev) {
            const el = document.getElementById(`mb-${f.id}`);
            if (el) { el.classList.remove('animate-flash'); void el.offsetWidth; el.classList.add('animate-flash'); }
          }
          prevVotes.current[f.id] = f.votes;
        });
      }, [foods]);

      return (
        <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'#020617' }}>

          {/* Navbar */}
          <nav className="mobile-nav">
            <div>
              <div className="nav-brand-title">🏆 LIVE RANKING</div>
              <div className="nav-brand-sub">UKK Kuliner 2024</div>
            </div>
            <div className="live-pill">
              <span className="live-dot animate-pulse"/>
              LIVE
            </div>
          </nav>

          {/* Scroll area */}
          <div className="scroll-area">

            {/* My Vote Card */}
            {myVotedName && (
              <div className="my-vote-card">
                <span className="my-vote-icon">⭐</span>
                <div>
                  <div className="my-vote-text">Vote kamu untuk:</div>
                  <div className="my-vote-name">{myVotedName}</div>
                </div>
              </div>
            )}

            {/* Update Banner */}
            {showBanner && (
              <div className="update-banner">
                <Icon name="Zap" size={14} style={{ color:'#34d399' }}/>
                Ranking diperbarui dari Firebase
              </div>
            )}

            {/* Loading */}
            {loading && (
              <div style={{ textAlign:'center', padding:'3rem 1rem' }}>
                <div style={{ width:'2.5rem',height:'2.5rem',border:'3px solid rgba(255,255,255,.1)',borderTopColor:'#34d399',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 1rem' }}/>
                <p style={{ color:'#64748b', fontSize:'.875rem' }}>Memuat data…</p>
              </div>
            )}

            {/* Empty */}
            {!loading && foods.length === 0 && (
              <div style={{ textAlign:'center', padding:'3rem 1rem', color:'#64748b' }}>
                <div style={{ fontSize:'3rem', marginBottom:'.75rem' }}>🍽️</div>
                <p style={{ fontWeight:600 }}>Belum ada menu terdaftar</p>
              </div>
            )}

            {/* Section Title */}
            {!loading && foods.length > 0 && (
              <div className="section-header">
                <span className="section-title">Semua Peserta ({foods.length})</span>
                <span style={{ fontSize:'.65rem', color:'#475569', fontWeight:600 }}>Diurutkan berdasarkan vote</span>
              </div>
            )}

            {/* Leaderboard */}
            {!loading && foods.length > 0 && (
              <div className="lb-container" style={{ height:`${totalH+8}px` }}>
                {positions.map(({ food, rank, cfg, top }) => {
                  const isMyVote = myVotedName && food.name === myVotedName;
                  return (
                    <div
                      id={`mb-${food.id}`}
                      key={food.id}
                      className={`rank-card ${cfg.cardClass}${isMyVote?' is-my-vote':''}`}
                      style={{ top:`${top}px`, height:`${cfg.itemH}px` }}
                    >
                      <div className="rank-badge" style={{ color:cfg.rankColor }}>#{rank}</div>

                      <div className="card-info">
                        <div className="card-menu-name">
                          <span style={{ overflow:'hidden', textOverflow:'ellipsis' }}>{food.name}</span>
                          {cfg.icon && <Icon name={cfg.icon} size={rank===1?16:14} className={cfg.iconClass} style={{ color:cfg.rankColor, flexShrink:0 }}/>}
                          {isMyVote && <span className="my-vote-badge">⭐ Pilihan Kamu</span>}
                        </div>
                        <div className="card-cook-name" style={{ color:cfg.cookColor }}>
                          <Icon name="ChefHat" size={10} style={{ opacity:.7, flexShrink:0 }}/>
                          Meja {food.table||'-'} · {food.cook||'Siswa'}
                        </div>
                      </div>

                      <div>
                        <div className="card-score" style={{ color:cfg.scoreColor }}>{food.votes||0}</div>
                        <div className="card-score-unit" style={{ color:cfg.scoreColor }}>pts</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            <div className="bottom-safe"/>
          </div>

          {/* Toast */}
          {toast && (
            <div className="toast">
              <div className="toast-icon"><Icon name="Trophy" size={14} style={{ color:'#34d399' }}/></div>
              {toast}
            </div>
          )}

          <style>{`@keyframes spin { to { transform:rotate(360deg); } }`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MobileLeaderboard/>);
  </script>
</body>
</html>
